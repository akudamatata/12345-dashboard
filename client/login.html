<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>身份验证 — 12345 态势感知平台</title>
    <meta name="description" content="12345 态势感知平台安全登录入口，请输入访问密码。">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f3ff;
            --secondary-color: #bd00ff;
            --accent-color: #ff007a;
            --success-color: #00e676;
            --bg-dark: #13131f;
            --panel-bg: #1f1f31;
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #8c8cab;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── 霓虹氛围光 ── */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.45;
            animation: float 20s infinite ease-in-out alternate;
            pointer-events: none;
        }
        .light-1 {
            width: 650px; height: 650px;
            background: radial-gradient(circle, rgba(189,0,255,0.3) 0%, transparent 60%);
            top: -220px; left: -180px;
        }
        .light-2 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, rgba(0,243,255,0.22) 0%, transparent 60%);
            bottom: -180px; right: -120px;
            animation-delay: -6s;
        }
        .light-3 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,0,122,0.18) 0%, transparent 60%);
            top: 55%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -13s;
        }

        @keyframes float {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(60px, 35px) scale(1.08); }
            100% { transform: translate(-35px, -50px) scale(0.93); }
        }

        /* ── 扫描线动态背景 ── */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 243, 255, 0.012) 2px,
                rgba(0, 243, 255, 0.012) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── 登录卡片容器 ── */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo 区 ── */
        .login-logo {
            text-align: center;
        }

        .login-logo .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.8rem;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5);
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(0,243,255,0.6)); }
            50%       { filter: drop-shadow(0 0 20px rgba(189,0,255,0.8)); }
        }

        .login-logo .logo-title {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .text-gradient {
            background: linear-gradient(135deg, #00f3ff, #bd00ff, #ff007a);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
            font-weight: 800;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .login-logo .logo-sub {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-top: 0.3rem;
        }

        /* ── 玻璃卡片 ── */
        .login-card {
            width: 100%;
            background: rgba(31, 31, 49, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow:
                0 32px 80px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(0, 243, 255, 0.04),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        /* 卡片顶部光晕边 */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 243, 255, 0.5), rgba(189,0,255,0.5), transparent);
        }

        /* ── 状态提示行 ── */
        .auth-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2rem;
            padding: 0.6rem 1rem;
            background: rgba(0, 243, 255, 0.06);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 50px;
            font-size: 0.78rem;
            color: var(--primary-color);
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .auth-badge .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: 0 0 8px var(--primary-color);
            animation: blink 1.5s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        /* ── 表单 ── */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.2s;
        }

        .password-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 0.95rem 3rem 0.95rem 2.8rem;
            border-radius: 10px;
            font-family: 'Inter', monospace;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.25s;
            outline: none;
        }

        .password-input::placeholder {
            letter-spacing: 0;
            color: rgba(140, 140, 171, 0.5);
        }

        .password-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 243, 255, 0.12), 0 0 20px rgba(0, 243, 255, 0.15);
            background: rgba(0, 243, 255, 0.04);
        }

        .password-input:focus + .input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--primary-color);
        }

        .toggle-visibility {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-secondary);
            padding: 0.25rem;
            transition: color 0.2s;
            line-height: 1;
        }

        .toggle-visibility:hover { color: #fff; }

        /* ── 登录按钮 ── */
        #login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-color), #00aacc);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.35), 0 4px 15px rgba(0,0,0,0.3);
        }

        #login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 35px rgba(0, 243, 255, 0.55), 0 8px 25px rgba(0,0,0,0.4);
        }

        #login-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        #login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 按钮光泽扫过效果 */
        #login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }

        #login-btn:hover:not(:disabled)::after {
            left: 150%;
        }

        /* ── 错误提示 ── */
        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 0, 122, 0.08);
            border: 1px solid rgba(255, 0, 122, 0.25);
            border-radius: 8px;
            font-size: 0.85rem;
            color: var(--accent-color);
            font-weight: 600;
            animation: shakeIn 0.4s ease;
        }

        .error-msg.visible {
            display: flex;
        }

        @keyframes shakeIn {
            0%  { transform: translateX(-8px); opacity: 0; }
            30% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
            100%{ transform: translateX(0); opacity: 1; }
        }

        /* ── 加载动画 ── */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ── 底部提示 ── */
        .login-footer {
            font-size: 0.72rem;
            color: rgba(140, 140, 171, 0.5);
            text-align: center;
            line-height: 1.7;
        }

        /* ── 输入框抖动 (密码错误时) ── */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-10px); }
            40%       { transform: translateX(10px); }
            60%       { transform: translateX(-6px); }
            80%       { transform: translateX(6px); }
        }

        .shake { animation: shake 0.4s ease; }

        /* ── 成功状态 ── */
        .success-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 230, 118, 0.06);
            border-radius: 20px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 20;
            backdrop-filter: blur(4px);
        }

        .success-overlay.visible {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .success-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 20px var(--success-color));
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { transform: scale(0); }
            to   { transform: scale(1); }
        }

        .success-text {
            font-size: 1rem;
            font-weight: 700;
            color: var(--success-color);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- 氛围光 -->
    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="ambient-light light-3"></div>

    <div class="login-wrap">
        <!-- Logo -->
        <div class="login-logo">
            <span class="logo-icon">🛡️</span>
            <div class="logo-title">12345 <span class="text-gradient">态势感知</span></div>
            <div class="logo-sub">SITUATIONAL AWARENESS PLATFORM</div>
        </div>

        <!-- 登录卡片 -->
        <div class="login-card">
            <!-- 验证成功遮罩 -->
            <div class="success-overlay" id="success-overlay">
                <div class="success-icon">✅</div>
                <div class="success-text">身份验证通过，正在跳转...</div>
            </div>

            <!-- 状态徽标 -->
            <div class="auth-badge">
                <span class="dot"></span>
                <span>受保护区域 · 需要身份验证才可继续</span>
            </div>

            <!-- 表单 -->
            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="password-field">访问密码</label>
                    <div class="input-wrap">
                        <input
                            type="password"
                            id="password-field"
                            class="password-input"
                            placeholder="请输入访问密码"
                            autocomplete="current-password"
                            autofocus
                            required
                        >
                    </div>
                </div>

                <button type="submit" id="login-btn">
                    <div class="btn-content">
                        <div class="spinner" id="btn-spinner"></div>
                        <span id="btn-label">进入指挥系统</span>
                    </div>
                </button>

                <div class="error-msg" id="error-msg" role="alert">
                    <span>🚫</span>
                    <span id="error-text">密码错误，拒绝访问。</span>
                </div>
            </form>
        </div>

        <!-- 底部说明 -->
        <div class="login-footer">
            此系统为内部专用平台 · 未经授权的访问企图将被记录<br>
            BUILD v2.6.4-PRIME-CF · Powered by Cloudflare Pages
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const pwField = document.getElementById('password-field');
        const loginBtn = document.getElementById('login-btn');
        const spinner = document.getElementById('btn-spinner');
        const btnLabel = document.getElementById('btn-label');
        const errorMsg = document.getElementById('error-msg');
        const errorText = document.getElementById('error-text');
        const successOverlay = document.getElementById('success-overlay');

        // 获取 redirect 参数（登录成功后跳回原页面）
        const params = new URLSearchParams(window.location.search);
        const redirectTo = params.get('redirect') || '/';

        // 清除错误状态
        pwField.addEventListener('input', () => {
            errorMsg.classList.remove('visible');
        });

        // 表单提交
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = pwField.value.trim();
            if (!password) return;

            // 设置加载状态
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            btnLabel.textContent = '验证中...';
            errorMsg.classList.remove('visible');

            try {
                const res = await fetch('/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password }),
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // 验证成功
                    successOverlay.classList.add('visible');
                    btnLabel.textContent = '验证通过';
                    setTimeout(() => {
                        window.location.href = redirectTo;
                    }, 900);
                } else {
                    // 密码错误
                    errorText.textContent = data.message || '密码错误，拒绝访问。';
                    errorMsg.classList.add('visible');
                    pwField.classList.add('shake');
                    pwField.value = '';
                    pwField.focus();
                    setTimeout(() => pwField.classList.remove('shake'), 400);

                    loginBtn.disabled = false;
                    spinner.style.display = 'none';
                    btnLabel.textContent = '进入指挥系统';
                }
            } catch (err) {
                errorText.textContent = '网络异常，请检查连接后重试。';
                errorMsg.classList.add('visible');
                loginBtn.disabled = false;
                spinner.style.display = 'none';
                btnLabel.textContent = '进入指挥系统';
            }
        });

        // Enter 键快捷提交
        pwField.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') form.requestSubmit();
        });
    </script>
</body>
</html>
